<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOMEK NFC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>DOMEK NFC 🏠</h1>

<div class="buttons">
  <button id="randomBtn">
    🎲 Random Meal
  </button>

  <button id="easyBtn">
    😴 Too Tired Today
  </button>
</div>
<div id="lastMeal"></div>
<div id="suggestionBox"></div>

<a
  href="https://docs.google.com/spreadsheets/d/1F2PWrotkjyzL-EjP14Cynz27FM-FnXhWp_OMJKqBnug/edit?usp=sharing"
  target="_blank"
  class="admin-link"
>
  ⚙️ Edit Meals
</a>

<h2>📅 This Week</h2>
<div id="weeklyPlanner"></div>

<div id="plannerModal" class="planner-modal hidden">

  <div class="planner-content">

    <h3 id="plannerDayTitle">
      Plan meal
    </h3>

    <select id="mealSelect"></select>

    <select id="authorSelect">
      <option value="Marysia">
        Marysia
      </option>

      <option value="Agata">
        Agata
      </option>

      <option value="Blandzus">
        Blandzuś
      </option>

      <option value="Jusia">
        Jusia
      </option>

      <option value="Igor">
        Igor
      </option>

      <option value="Zosia">
        Zosia
      </option>

      <option value="Babcia_irenka">
        Babcia Irenka
      </option>

      <option value="Leon">
        Leon
      </option>

      <option value="Gosc">
        Gość
      </option>
    </select>

    <button id="savePlanBtn">
      ✅ Save meal
    </button>

  </div>

</div>

<div id="mealContainer"></div>

<script src="script.js"></script>

</body>
</html>
